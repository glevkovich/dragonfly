name: Build Dragonfly
description: "Build Dragonfly with configurable CMake options"

inputs:
  build-type:
    description: "CMake build type (Debug or Release)"
    required: false
    default: 'Debug'
    type: string
  build-dir:
    description: "Build directory name (relative to workspace root)"
    required: false
    default: 'build'
    type: string
  c-compiler:
    description: "C compiler to use"
    required: false
    default: ''
    type: string
  cxx-compiler:
    description: "C++ compiler to use"
    required: false
    default: ''
    type: string
  cxx-flags:
    description: "C++ compiler flags"
    required: false
    default: '-no-pie'
    type: string
  sanitizers:
    description: "Enable sanitizers (NoSanitizers or Sanitizers)"
    required: false
    default: 'NoSanitizers'
    type: string
  with-aws:
    description: "Build with AWS support"
    required: false
    default: 'ON'
    type: string
  targets:
    description: "Build targets to compile"
    required: false
    default: 'src/all'
    type: string
  ccache-max-size:
    description: "Max ccache size per config (e.g. 1G, 2G, 500M)"
    required: false
    default: '1G'
    type: string
  enable-ccache:
    description: "Enable ccache ('false' skips cache restore/save and passes -DENABLE_CCACHE=OFF)"
    required: false
    default: 'true'
    type: string
  cache-key-suffix:
    description: "Extra token for cache keys - pass the container so glibc/musl (and gcc version) caches don't collide"
    required: false
    default: 'default'
    type: string

runs:
  using: "composite"
  steps:
    - name: Setup ccache
      if: ${{ inputs.enable-ccache == 'true' }}
      # ccache caches compiled objects so unchanged files are not recompiled.
      # The dev containers already ship ccache; this wires it to the GitHub Actions
      # cache so objects persist across ephemeral runners (see helio CI for prior art).
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: dfly-ccache-${{ inputs.cache-key-suffix }}-${{ runner.os }}-${{ runner.arch }}-${{ inputs.build-type }}-${{ inputs.cxx-compiler }}-${{ inputs.sanitizers }}
        max-size: ${{ inputs.ccache-max-size }}
        verbose: 1

    - name: Configure CMake
      shell: bash
      run: |
        # Set sanitizer flags
        ASAN="OFF"
        USAN="OFF"
        if [ '${{ inputs.sanitizers }}' = 'Sanitizers' ]; then
          echo "Enabling ASAN/USAN"
          ASAN="ON"
          USAN="ON"
        fi

        # Build cmake command array
        CMAKE_CMD=(cmake
          -B "${GITHUB_WORKSPACE}/${{ inputs.build-dir }}"
          -DCMAKE_BUILD_TYPE="${{ inputs.build-type }}"
          -GNinja
        )

        # Let callers turn ccache off (also disables it in CMake).
        if [ "${{ inputs.enable-ccache }}" != "true" ]; then
          CMAKE_CMD+=(-DENABLE_CCACHE=OFF)
        fi

        # Add optional compiler flags
        if [ -n "${{ inputs.c-compiler }}" ]; then
          CMAKE_CMD+=(-DCMAKE_C_COMPILER="${{ inputs.c-compiler }}")
        fi
        if [ -n "${{ inputs.cxx-compiler }}" ]; then
          CMAKE_CMD+=(-DCMAKE_CXX_COMPILER="${{ inputs.cxx-compiler }}")
        fi
        if [ -n "${{ inputs.cxx-flags }}" ]; then
          CMAKE_CMD+=(-DCMAKE_CXX_FLAGS="${{ inputs.cxx-flags }}")
        fi

        # Add fixed options
        CMAKE_CMD+=(
          -DPRINT_STACKTRACES_ON_SIGNAL=ON
          -DWITH_AWS="${{ inputs.with-aws }}"
          -DWITH_GCP=OFF
          -DWITH_UNWIND=OFF
          -DWITH_GPERF=OFF
          -DWITH_ASAN="${ASAN}"
          -DWITH_USAN="${USAN}"
          -DLEGACY_GLOG=OFF
        )

        # Execute CMake
        echo "Running: ${CMAKE_CMD[@]}"
        "${CMAKE_CMD[@]}"

    - name: Build
      shell: bash
      run: |
        cd ${GITHUB_WORKSPACE}/${{ inputs.build-dir }}
        echo "Building target: ${{ inputs.targets }}"
        # reset counters so stats reflect this build
        ccache -z || true
        ninja ${{ inputs.targets }}
        echo "===== ccache stats (this build) ====="
        ccache -s || true
