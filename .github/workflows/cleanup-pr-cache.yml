# Deletes the GitHub Actions caches scoped to a pull request the moment it is
# closed or merged. PR caches live under refs/pull/<N>/merge and are otherwise
# only reclaimed by the 7-day-unused / 10 GB LRU eviction policy; with a high PR
# volume that can pin the repo near the 10 GB ceiling and cause cache thrashing.
# This event-driven cleanup keeps the budget free for the caches that matter.
name: Cleanup PR caches

on:
  pull_request:
    types: [closed]

# One cleanup per PR; a later close/merge event supersedes an in-flight run.
concurrency:
  group: cleanup-pr-cache-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    # Fork PRs run with a read-only GITHUB_TOKEN and cannot delete caches (and
    # generally cannot create them either), so restrict to same-repo PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository
    # Host runner (no container:) so the preinstalled gh CLI is available.
    runs-on: ubuntu-latest
    permissions:
      actions: write   # required to delete caches
    steps:
      - name: Delete caches for the closed PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_REF: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          set -euo pipefail
          echo "Cleaning caches scoped to $PR_REF"
          ids=$(gh cache list --ref "$PR_REF" --limit 100 --json id --jq '.[].id')
          if [ -z "$ids" ]; then
            echo "No caches found for $PR_REF"
            exit 0
          fi
          for id in $ids; do
            echo "Deleting cache id=$id"
            gh cache delete "$id"
          done
